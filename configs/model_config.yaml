model:
  name: "tft"
  hidden_size: 128
  attention_head_size: 4
  dropout: 0.1
  hidden_continuous_size: 16
  output_size: 7  # 7 quantiles
  loss: "QuantileLoss"
  
training:
  max_epochs: 30
  batch_size: 128
  learning_rate: 0.03
  gradient_clip_val: 0.1
  early_stopping_patience: 10
  
  optimizer: "ranger"
  reduce_on_plateau_patience: 4
  
logging:
  log_interval: 10
  log_dir: "lightning_logs"
